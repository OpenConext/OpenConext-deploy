---
- name: "Create midproxy group"
  group:
    name: "{{ sram_midproxy_group }}"
    state: "present"
  register: "result"

- name: "Create midproxy user"
  user:
    name: "{{ sram_midproxy_user }}"
    group: "{{ sram_midproxy_group }}"
    comment: "User to run Midproxy service"
    shell: "/bin/false"
    password: "!"
    create_home: false
    state: "present"
  register: "result"

- name: "Save midproxy user uid"
  set_fact:
    # --check fails on result.uid if user was never provisioned
    midproxy_user_uid: "{{ result.uid | default(1000) }}"

- name: Create directory to keep configfile
  ansible.builtin.file:
    dest: "/opt/sram/midproxy"
    state: directory
    owner: "{{ sram_midproxy_user }}"
    group: "{{ sram_midproxy_group }}"
    # mkdir: cannot create directory '.': Permission denied
    mode: "0777"

- name: Copy EB SP metadata
  ansible.builtin.copy:
    src: "{{ inventory_dir }}/files/sram_midproxy/{{ sram_midproxy_sp_metadata }}"
    dest: "/opt/sram/midproxy/{{ sram_midproxy_sp_metadata }}"
    owner: "{{ sram_midproxy_user }}"
    group: "{{ sram_midproxy_group }}"
    # mkdir: cannot create directory '.': Permission denied
    mode: "0644"

- name: Copy SATOSA conf files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/sram/midproxy/{{ item }}"
    owner: "{{ sram_midproxy_user }}"
    group: "{{ sram_midproxy_group }}"
  with_items:
    - internal_attributes.yaml
    - proxy_conf.yaml
    - plugins/

- name: "Pull satosa image"
  community.docker.docker_image_pull:
    name: "{{ sram_midproxy_satosa_image }}"
  register: "satosa_image"

- name: Create the SATOSA container
  community.docker.docker_container:
    name: sram-midproxy
    image: "{{ sram_midproxy_satosa_image }}"
    pull: never
    restart_policy: "always"
    state: started
    restart: "{{ satosa_image is changed }}"
    # 2026-05-21 07:25:44 +0000] [1] [ERROR] Control server error: [Errno 13] Permission denied: '/.gunicorn'
    # user: "{{ midproxy_user_uid }}"
    networks:
      - name: "loadbalancer"
    env:
      SATOSA_BASE: 'https://midproxy.{{ openconextaccess_base_domain }}'
      SATOSA_STATE_ENCRYPTION_KEY: '{{ sram_midproxy_state_encryption_key }}'
      SATOSA_SP_METADATA: '{{ sram_midproxy_sp_metadata }}'
      SATOSA_ISSUER: '{{ sram_midproxy_issuer }}'
      SATOSA_CLIENT_ID: '{{ sram_midproxy_client_id }}'
      SATOSA_CLIENT_SECRET: '{{ sram_midproxy_client_secret }}'
    volumes:
      - /opt/sram/midproxy:/etc/satosa
    labels:
      traefik.http.routers.midproxy.rule: "Host(`midproxy.{{ openconextaccess_base_domain }}`)"
      traefik.http.routers.midproxy.tls: "true"
      traefik.enable: "true"
    # curl is not availavble in the minimized satosa image
    # so this healthcheck won't work
    # healthcheck:
    #   test: ["CMD", "curl", "--fail" , "http://localhost"  ]
    #   interval: 10s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
