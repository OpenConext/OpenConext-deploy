---
    # - name: Check some variables
    #   when: mongo_cluster_members is not defined
    #   ansible.builtin.fail:
    #     msg: "Something is wrong, mongo_mode was set to cluster but mongo_cluster_members is undefined."

- name: Message for non redhat family servers
  when: ansible_facts['os_family'] != 'RedHat'
  ansible.builtin.fail:
    msg: "Sorry, this role only works on RedHat family servers"

- name: Install and configure mongo on redhat family servers
  when:
    - ansible_facts['os_family'] == 'RedHat'
  block:
    - name: Debug standalone or cluster mode
      ansible.builtin.debug:
        msg: "{{ mongo_mode }}"
        verbosity: 2

    - name: Debug cluster reconfiguration is allowed
      ansible.builtin.debug:
        msg: "{{ mongo_configure_cluster }}"
        verbosity: 2

    - name: Use temporarily python3 as remote interpreter, this fixes pymongo # todo is this still necessary?
      ansible.builtin.set_fact:
        ansible_python_interpreter: "/usr/bin/python3"
      tags: mongo_users

    - name: Include installation tasks
      ansible.builtin.include_tasks:
        file: install.yml

    - name: Include Certificate tasks
      ansible.builtin.include_tasks:
        file: certs.yml

    # todo: magw eg?
    # - name: Include standalone configuration tasks
    #   ansible.builtin.include_tasks:
    #     file: standaloneconfig.yml
    #   when:
    #     - mongo_mode == "standalone"

    - name: Include General config tasks
      ansible.builtin.include_tasks:
        file: generalconfig.yml

    - name: Include cluster configuration tasks
      ansible.builtin.include_tasks:
        file: clusterconfig.yml
      when:
        - mongo_mode == "cluster"
        - mongo_configure_cluster | bool # safest option is to set this to false and enable with -e mongo_configure_cluster=true

    - name: Include cluster check tasks
      ansible.builtin.include_tasks:
        file: clustercheck.yml
      when:
        - mongo_mode == "cluster"

    # todo: add admin user for cluster and standalone in a separate file?

    - name: Include Service tasks
      ansible.builtin.include_tasks:
        file: services.yml

    - name: Include user creation
      ansible.builtin.include_tasks:
        file: users.yml
      when: not replica_status.failed OR mongo_mode == "standalone" # Cannot add users on a broken cluster

    - name: Include postinstallation tasks
      ansible.builtin.include_tasks:
        file: postinstall.yml

    - name: Use python2 again as remote interpreter on centos 7
      ansible.builtin.set_fact:
        ansible_python_interpreter: "/usr/bin/python"
      when:
        - ansible_facts['distribution'] == 'CentOS'
        - ansible_facts['distribution_major_version'] == '7'
