---
- name: "Check and create users"
  become: false # No mc client actions as root
  block:
    - name: "Check whether user is already configured"
      ansible.builtin.command: >
        {{ minio_mc }} admin user info {{ minio_alias }} {{ user.username }}
      register: "minio_user_present"
      changed_when: false
      failed_when: "minio_user_present.rc > 1"  # rc 1 means alias not present that's what we wanted to know
      check_mode: false

    - name: "Create and configure user"
      when: 'minio_user_present.rc == 1  and  "Unable to get user info" in minio_user_present.stderr'
      block:
        - name: "Create user"
          ansible.builtin.command: >
            {{ minio_mc }} admin user add {{ minio_alias }} {{ user.username }} {{ user.password }}
          register: "minio_add_user"
          changed_when: >
             "Added user `{{ user.username }}` successfully" in minio_add_user.stdout
#          no_log: true

        - name: "Attach read write policy"
          when: "'full_access' in user and user.full_access"
          ansible.builtin.command: >
            {{ minio_mc }} admin policy attach {{ minio_alias }} readwrite --user={{ user.username }}
          register: "minio_attach_user"
          changed_when: >
             "Added user `" + user.username + "` successfully" in minio_add_user.stdout
