---
- name: "Create metadata group"
  group:
    name: "{{ metadata.group }}"
    state: "present"
  register: "result"

- name: "Save metadata group gid"
  set_fact:
    metadata_group_gid: "{{ result.gid }}"

- name: "Create metadata user"
  user:
    name: "{{ metadata.user }}"
    group: "{{ metadata.group }}"
    comment: "User to run metadata service"
    shell: "/bin/false"
    password: "!"
    home: "{{ metadata.basedir }}"
    create_home: false
    state: "present"
  register: "result"

- name: "Save metadata user uid"
  set_fact:
    metadata_user_uid: "{{ result.uid }}"


- name: "Create metadata directories"
  file:
    path: "{{ item.dir }}"
    state: "directory"
    mode: "{{ item.mode }}"
    owner: "root"
    group: "{{ metadata.group }}"
  with_items:
    - { dir: "{{metadata.basedir}}/web",   mode: "0775" }
    - { dir: "{{metadata.basedir}}/feeds", mode: "0755" }
    - { dir: "{{metadata.basedir}}/src",   mode: "0755" }
    - { dir: "{{metadata.basedir}}/certs", mode: "0755" }
    - { dir: "{{metadata.basedir}}/xslt",  mode: "0755" }
  notify: "Restart the pyFF container"


- name: "Start pyff container"
  include_tasks: "pyff.yml"

- name: "Start http container"
  include_tasks: "http.yml"
